name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Please review the changes (diff) in this PR according to our team's coding conventions.
            Write the review in English, and post it as a comment on the PR.

            ## Coding Conventions

            ### Common

            After an opening brace, always insert a line break before writing code.

            ```kotlin
            @Service
            @Transactional(rollbackFor = [Exception::class])
            class MemberServiceImpl: MemberService {

                override fun deleteAccount
            ```

            No blank line after the closing brace at the very end of the file's code.
            ```kotlin
                    return ApiResponse.ok("");
            }
            }
            ```

            All return values must use `BaseResponse` for a common response, and should make use of `response`.
            ```kotlin
            return BaseResponse.ok(SignUpResponse.of("가입되었습니다."));
            ```

            If a set of parentheses contains 2 or more values, break each onto its own line.
            ```kotlin
            return SignInResponse.of(
                tokenService.generateAccessToken(
                    generateTokenRequest,
                    httpServletResponse
                ),
                tokenService.generateRefreshToken(
                    generateTokenRequest,
                    httpServletResponse
                )
            )
            ```

            Parameter names should be the class name written in camelCase.

            Place longer annotations below shorter ones.

            `return` statements should always be preceded by a line break.

            In the parameter list, DTOs should come before Spring Boot's built-in types (e.g. `HttpServletRequest`).

            When declaring variables, always use `val`. (However, `var` may be used at your own discretion — any downsides resulting from that choice are the responsibility of the person who made it.)

            When doing dependency injection (DI), write it after the class name, treating it as a constructor parameter.
            ```kotlin
            // When receiving a single dependency
            class CommunityLikeImpl(
                private val communityLikeRepository: CommunityLikeRepository
            ): { ... }

            // When receiving two or more dependencies
            class CommunityLikeImpl(
                private val communityLikeRepository: CommunityLikeRepository,
                private val memberRepository: MemberRepository
            ): { ... }
            ```
            When refactoring Java's `orElseThrow` usage, use `?:` instead, and always insert a line break before the `?:`.
            ```kotlin
            // Example 1
            val member = memberRepository.findMemberById(communityLikeRequest.memberId)
                ?: throw ApplicationException(MemberStatusCode.MEMBER_NOT_FOUND)


            // Example 2
            communityLikeRepository.delete(communityLikeRepository.findByMember(memberRepository.findMemberById(communityPostUnlikeRequest.memberId)
                ?: throw ApplicationException(MemberStatusCode.MEMBER_NOT_FOUND)
            )
                ?: throw ApplicationException(LikeStatusCode.NOT_LIKED)
            )
            ```
            Omit the type declaration whenever the compiler can infer it.
            ```kotlin
            // X — Member type is declared even though it could be inferred
            val member: Member = memberRepository.findMemberById(communityLikeRequest.memberId)
                ?: throw ApplicationException(MemberStatusCode.MEMBER_NOT_FOUND)

            // O — Member is omitted since it can be inferred
            val member = memberRepository.findMemberById(communityLikeRequest.memberId)
                ?: throw ApplicationException(MemberStatusCode.MEMBER_NOT_FOUND)
            ```
            Always create a use case (interface) first, and then bundle it into an implementation (service).

            When implementing via inheritance, write it as follows:
            ```kotlin
            // Inheriting from two or more
            class CommunityLikeImpl(
                private val communityLikeRepository: CommunityLikeRepository,
                private val memberRepository: MemberRepository
            ): CommunityPostLikeUseCase, CommunityPostUnlikeUseCase {

                // Inheriting from only one
                class CommunityLikeImpl(
                    private val communityLikeRepository: CommunityLikeRepository,
                    private val memberRepository: MemberRepository
                ): CommunityPostLikeUseCase {
            ```
            b. When overriding via inheritance, do not use the `@Override` annotation; use Kotlin's native syntax as below.
            ```kotlin
            override fun like(): CommunityPostLikeResponse {
            ```
            c. The file structure should be as follows:
            ```
            service/
            └── usecase/
            │   ├── CommunityPostLikeUseCase
            │   └── CommunityPostUnlikeUseCase
            └── CommunityLikeImpl
            ```
            Do not use the Builder pattern — use a constructor to create instances instead.

            All other conventions not covered here follow the Backend Java Convention.

            ### Entity classes

            For all entity classes, the ID should primarily use the `Long` type. (However, this may later be refactored to a type such as `UUID`.)

            The ID should be `private`.

            Do not create a setter for the ID; create the getter as follows:
            ```kotlin
            @Id
            @GeneratedValue(strategy = GenerationType.IDENTITY)
            private val id: Long? = null

            fun getId() = id
            ```

            ### Parameters

            Constructor parameters and method parameters follow the same formatting.

            For constructor parameters, always insert a line break right after the opening parenthesis.

            If there is a superclass/interface after the closing parenthesis, place the colon (`:`) immediately after the closing parenthesis.

            When inheriting from 2 or more, separate them with a comma (`,`) without a line break.
            ```kotlin
            class PostServiceImpl(
                private val postRepository: PostRepository
            ): PostService {

                class PostServiceImpl(
                    private val postRepository: PostRepository,
                    private val memberRepository: MemberRepository
                ): PostService {
            ```

            ```kotlin
            // When a method has a single parameter
            fun signUp(
                signUpRequest: SignUpRequest
            ): SignUpResponse { ... }

            // When a method has two or more parameters
            fun signIn(
                signInRequest: SignInRequest,
                httpServletResponse: HttpServletResponse
            ): SignInResponse { ... }
            ```

            ## Review Guidelines
            - Point out any parts that violate the above conventions, based on the changed files/lines.
            - In addition to convention violations, also mention any obvious bugs, null-safety issues, or missing exception handling that you notice.
            - Do not nitpick parts that have no actual issues.
            - For each point raised, indicate the file name and, where possible, the line number, and briefly specify which convention rule was violated.
            - If there are no major issues overall, state that clearly.