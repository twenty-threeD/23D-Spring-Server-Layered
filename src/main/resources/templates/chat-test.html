<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Test</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3efe6;
            --panel: #fffaf0;
            --line: #d9cbb3;
            --text: #1f1a14;
            --accent: #a4492a;
            --accent-soft: #f3d7c5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "IBM Plex Sans KR", "Apple SD Gothic Neo", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(164, 73, 42, 0.14), transparent 28%),
                linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            width: min(960px, calc(100% - 32px));
            margin: 32px auto;
            display: grid;
            gap: 16px;
        }

        .panel {
            background: rgba(255, 250, 240, 0.96);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 18px 40px rgba(49, 35, 17, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input,
        textarea,
        button {
            width: 100%;
            font: inherit;
        }

        input,
        textarea {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
            background: var(--accent);
            color: #fffaf5;
        }

        button.secondary {
            background: #eadbc8;
            color: var(--text);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions button {
            width: auto;
            min-width: 140px;
        }

        .status {
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--accent-soft);
            font-size: 14px;
            white-space: pre-wrap;
        }

        .messages,
        .logs {
            display: grid;
            gap: 10px;
            max-height: 360px;
            overflow: auto;
            padding-right: 4px;
        }

        .message-item,
        .log-item {
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-meta {
            font-size: 12px;
            color: #655847;
            margin-bottom: 6px;
        }

        @media (max-width: 640px) {
            main {
                width: calc(100% - 20px);
                margin: 16px auto;
            }

            .panel {
                padding: 16px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="panel">
        <h1>WebSocket Chat Test</h1>
        <p>JWT와 roomId를 넣고 직접 STOMP `CONNECT`, `SUBSCRIBE`, `SEND`를 테스트할 수 있습니다.</p>
    </section>

    <section class="panel">
        <div class="grid">
            <div>
                <label for="wsUrl">WebSocket URL</label>
                <input id="wsUrl" value="http://localhost:8080/ws-stomp">
            </div>
            <div>
                <label for="roomId">Room ID</label>
                <input id="roomId" type="number" value="1">
            </div>
        </div>
        <div style="margin-top: 12px;">
            <label for="token">JWT Access Token</label>
            <textarea id="token" placeholder="Bearer 없이 JWT 본문만 넣어도 됩니다."></textarea>
        </div>
        <div class="actions" style="margin-top: 14px;">
            <button id="connectButton" type="button">Connect + Subscribe</button>
            <button id="disconnectButton" type="button" class="secondary">Disconnect</button>
            <button id="loadMessagesButton" type="button" class="secondary">Load History</button>
        </div>
        <div id="status" class="status" style="margin-top: 14px;">대기 중</div>
    </section>

    <section class="panel">
        <label for="message">Send Message</label>
        <textarea id="message" placeholder="보낼 메시지"></textarea>
        <div class="actions" style="margin-top: 14px;">
            <button id="sendButton" type="button">Send</button>
        </div>
    </section>

    <section class="panel">
        <h2 style="margin-top: 0;">Messages</h2>
        <div id="messages" class="messages"></div>
    </section>

    <section class="panel">
        <h2 style="margin-top: 0;">Logs</h2>
        <div id="logs" class="logs"></div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const wsUrlInput = document.getElementById("wsUrl");
    const roomIdInput = document.getElementById("roomId");
    const tokenInput = document.getElementById("token");
    const messageInput = document.getElementById("message");
    const statusElement = document.getElementById("status");
    const messagesElement = document.getElementById("messages");
    const logsElement = document.getElementById("logs");

    const connectButton = document.getElementById("connectButton");
    const disconnectButton = document.getElementById("disconnectButton");
    const loadMessagesButton = document.getElementById("loadMessagesButton");
    const sendButton = document.getElementById("sendButton");

    let stompClient = null;
    let subscriptionId = null;

    function addLog(text) {
        const item = document.createElement("div");
        item.className = "log-item";
        item.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
        logsElement.prepend(item);
    }

    function setStatus(text) {
        statusElement.textContent = text;
    }

    function normalizeToken(rawToken) {
        if (!rawToken) {
            return "";
        }
        const trimmed = rawToken.trim();
        return trimmed.startsWith("Bearer ") ? trimmed.substring(7) : trimmed;
    }

    function nextSubscriptionId() {
        subscriptionId = `sub-${Date.now()}`;
        return subscriptionId;
    }

    function renderMessage(message) {
        const item = document.createElement("div");
        item.className = "message-item";

        const meta = document.createElement("div");
        meta.className = "message-meta";
        const createdAt = message.createdAt ? new Date(message.createdAt).toLocaleString() : "";
        meta.textContent = `roomId=${message.roomId} | sender=${message.senderUsername ?? "unknown"} | ${createdAt}`;

        const body = document.createElement("div");
        body.textContent = message.message ?? JSON.stringify(message);

        item.append(meta, body);
        messagesElement.prepend(item);
    }

    async function loadHistory() {
        const roomId = roomIdInput.value.trim();
        const token = normalizeToken(tokenInput.value);

        if (!roomId || !token) {
            setStatus("roomId와 JWT가 필요합니다.");
            return;
        }

        try {
            const response = await fetch(`/api/chat/rooms/${roomId}/messages`, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            const payload = await response.json();
            messagesElement.innerHTML = "";

            const history = Array.isArray(payload.data) ? payload.data : [];
            history.slice().reverse().forEach(renderMessage);
            addLog(`이전 메시지 ${history.length}개 로드`);
        } catch (error) {
            addLog(`이전 메시지 로드 실패: ${error.message}`);
        }
    }

    connectButton.addEventListener("click", () => {
        const url = wsUrlInput.value.trim();
        const roomId = roomIdInput.value.trim();
        const token = normalizeToken(tokenInput.value);

        if (!url || !roomId || !token) {
            setStatus("WebSocket URL, roomId, JWT를 모두 입력해야 합니다.");
            return;
        }

        if (stompClient && stompClient.connected) {
            addLog("기존 연결을 종료하고 다시 연결합니다.");
            stompClient.disconnect(() => addLog("기존 STOMP 연결 종료"));
        }

        const handshakeUrl = new URL(url, window.location.origin);
        handshakeUrl.searchParams.set("token", token);

        const sockJs = new SockJS(handshakeUrl.toString(), null, {
            transports: ["websocket"]
        });
        stompClient = Stomp.over(sockJs);
        stompClient.debug = (message) => addLog(`STOMP: ${message}`);
        setStatus("CONNECTING");

        stompClient.connect({
                Authorization: `Bearer ${token}`
            },
            () => {
                setStatus("CONNECTED");
                addLog("STOMP CONNECTED");
                stompClient.subscribe(`/topic/chat/rooms/${roomId}`, (frame) => {
                    try {
                        renderMessage(JSON.parse(frame.body));
                        addLog(`room ${roomId} 메시지 수신`);
                    } catch (error) {
                        addLog(`메시지 파싱 실패: ${frame.body}`);
                    }
                }, {
                    id: nextSubscriptionId()
                });
                addLog(`room ${roomId} 구독 완료`);
            },
            (error) => {
                setStatus("ERROR");
                addLog(`STOMP 연결 실패: ${error}`);
            });
    });

    disconnectButton.addEventListener("click", () => {
        if (!stompClient) {
            return;
        }
        if (stompClient.connected) {
            stompClient.disconnect(() => {
                setStatus("DISCONNECTED");
                addLog("STOMP 연결 종료");
            });
        } else {
            setStatus("DISCONNECTED");
        }
        stompClient = null;
    });

    sendButton.addEventListener("click", () => {
        const roomId = roomIdInput.value.trim();
        const message = messageInput.value.trim();

        if (!roomId || !message) {
            setStatus("roomId와 message를 입력해야 합니다.");
            return;
        }

        if (!stompClient || !stompClient.connected) {
            setStatus("먼저 연결해야 합니다.");
            return;
        }

        stompClient.send("/app/chat.send", {
            "content-type": "application/json"
        }, JSON.stringify({
            roomId: Number(roomId),
            message
        }));
        addLog(`room ${roomId} 메시지 전송`);

        messageInput.value = "";
    });

    loadMessagesButton.addEventListener("click", loadHistory);
</script>
</body>
</html>
